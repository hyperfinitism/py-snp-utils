name: Ruff

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install Ruff
      run: pip install ruff
    - name: Ruff check (lint)
      run: ruff check .
    - name: Ruff format (formatting)
      run: ruff format --check .
